name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      BINARY_NAME: range-scout
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          targets=(
            "linux amd64 tar.gz"
            "linux arm64 tar.gz"
            "darwin amd64 tar.gz"
            "darwin arm64 tar.gz"
            "windows amd64 zip"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch archive <<<"$target"

            name="${BINARY_NAME}_${goos}_${goarch}"
            ext=""
            if [[ "$goos" == "windows" ]]; then
              ext=".exe"
            fi

            output="dist/${name}${ext}"
            echo "Building ${output}"

            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags="-s -w" -o "$output" .

            if [[ "$archive" == "zip" ]]; then
              (
                cd dist
                zip -9 "${name}.zip" "${name}${ext}"
              )
            else
              tar -C dist -czf "dist/${name}.tar.gz" "${name}${ext}"
            fi
          done

          (
            cd dist
            sha256sum ./* > checksums.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
